<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="color-bg-blue">
    <main class="form-container">
      <form action="" class="ira-form">
        <h1 class="main-heading-form">Roth IRA Calculator</h1>

        <div class="form-element">
          <label class="form-label" for="balance">Balance ($) </label>
          <input class="form-input" type="text" id="balance" />
        </div>

        <div class="form-element">
          <label class="form-label" for="annual_contribution"
            >Annual contribution ($)
          </label>

          <input class="form-input" type="text" id="annual_contribution" />
        </div>

        <fieldset>
          <legend>Maximize contributions?</legend>
          <div class="form-radios">
            <input type="radio" name="maximize_contributions" id="yes" />
            <label for="yes">Yes</label>
            <input type="radio" name="maximize_contributions" id="no" />
            <label for="no">No</label>
          </div>
        </fieldset>

        <div class="form-element">
          <label class="form-label" for="rate_return"
            >Expected rate of return (%)
          </label>
          <input class="form-input" type="number" id="rate_return" />
        </div>

        <div class="form-element">
          <label class="form-label" for="age">Current age </label>
          <input class="form-input" type="number" id="age" />
        </div>

        <div class="form-element">
          <label class="form-label" for="age_retirement">Retirement age </label>
          <input class="form-input" type="number" id="age_retirement" />
        </div>

        <div class="form-element">
          <label class="form-label" for="tax_rate"
            >Marginal tax rate (%)
          </label>
          <input class="form-input" type="number" id="tax_rate" />
        </div>

        <div class="form-element">
          <input class="btn btn-submit" type="submit" value="Calculate" />
          <input class="btn btn-reset" type="reset" value="Reset" />
        </div>

        <p class="form-note">
          This exercise is a simplified version of the Roth IRA Calculator at
          <a href="https://www.calculator.net/roth-ira-calculator.html">
            Calculator.net
          </a>
        </p>
      </form>
    </main>
  </body>
</html>
